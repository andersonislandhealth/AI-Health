# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json
# Staging CMS header — merged with collections.yml by admin/merge-config.py

backend:
  name: github
  repo: andersonislandhealth/AI-Health
  branch: cms-2
  auth_methods:
    - oauth

site_url: https://test-aiha.netlify.app
display_url: https://test-aiha.netlify.app
logo_url: https://test-aiha.netlify.app/assets/AI%20Health%20Custom%20Logo%20v9.png

media_folder: assets
public_folder: /assets

# Asset Library folders — match repo layout (assets/photos, assets/icons, etc.)
asset_collections:
  - name: photos
    label: Photos
    icon: photo_library
    media_folder: /assets/photos
    public_folder: /assets/photos
  - name: icons
    label: Icons
    icon: imagesmode
    media_folder: /assets/icons
    public_folder: /assets/icons
  - name: site_assets
    label: Site assets
    icon: brand_family
    media_folder: /assets
    public_folder: /assets
