# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json
# Staging CMS — commits go to cms branch. Used by Netlify branch/preview deploys.
# Update site_url / display_url if the preview Netlify URL changes.

backend:
  name: github
  repo: andersonislandhealth/AI-Health
  branch: cms
  auth_methods:
    - oauth

site_url: https://incredible-cannoli-8dd540.netlify.app
display_url: https://incredible-cannoli-8dd540.netlify.app
logo_url: https://incredible-cannoli-8dd540.netlify.app/assets/AI%20Health%20Custom%20Logo%20v9.png

media_folder: assets/photos
public_folder: /assets/photos

collections:
  - name: site_content
    label: Site Content
    icon: edit_note
    files:
      - name: board
        label: Board Members
        file: board.json
        format: json
        fields:
          - label: Members
            name: members
            widget: list
            label_singular: Member
            summary: "{{fields.name}} — {{fields.role}}"
            fields:
              - label: Name
                name: name
                widget: string
              - label: Role
                name: role
                widget: string
                hint: "Examples — President, Secretary, VP and Treasurer, Board Member"
              - label: Biography
                name: bio
                widget: text
                required: false
                hint: "Leave empty until ready. Members without a bio do not show the expand arrow on the website."
              - label: Photo path
                name: photo
                widget: string
                required: false
                hint: "Optional. Leave empty for now (photos are not shown on the site yet). Example — assets/photos/jane-fowler.jpg"

      - name: events
        label: Events
        file: events.json
        format: json
        fields:
          - label: Events
            name: events
            widget: list
            label_singular: Event
            summary: "{{fields.title}}"
            fields:
              - label: Title
                name: title
                widget: string
              - label: Date
                name: date
                widget: datetime
                type: date
                hint: "Required. Use YYYY-MM-DD. The site auto-sorts upcoming vs past by this date (Pacific time)."
              - label: Display date
                name: displayDate
                widget: string
                required: false
                hint: "Optional friendly label, e.g. April 29, 2026. If empty, the site formats the date for you."
              - label: Location
                name: location
                widget: string
              - label: Description
                name: description
                widget: text

      - name: giving_progress
        label: Fundraising Progress
        file: giving-progress.json
        format: json
        fields:
          - label: Goal ($)
            name: goal
            widget: number
            value_type: int
            hint: "Fundraising target in dollars (e.g. 81600)."
          - label: Current amount ($)
            name: current
            widget: number
            value_type: int
            hint: "Amount raised so far. Zeffy may show live progress separately."
          - label: Last updated label
            name: updated
            widget: string
            hint: "Display text for when numbers were last updated, e.g. Feb 28, 2026."
          - label: Tick label offset
            name: tickLabelOffset
            widget: number
            value_type: int
            required: false
            hint: "Optional thermometer label adjustment. Usually 0."
          - label: Thermometer divisions
            name: divisions
            widget: number
            value_type: int
            required: false
            hint: "Number of segments on the goal thermometer. Usually 8."
