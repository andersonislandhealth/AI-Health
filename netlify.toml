[build]
  publish = "."

# Sveltia CMS: copy the right config before deploy (see docs/CMS.md).
[context.production]
  command = "cp admin/config.production.yml admin/config.yml"

[context.cms]
  command = "cp admin/config.staging.yml admin/config.yml"

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    X-Frame-Options = "DENY"
