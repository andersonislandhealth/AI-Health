[build]
  publish = "."

# Merge Sveltia CMS config (header + shared collections) before deploy.
[context.production]
  command = "python3 admin/merge-config.py production"

[context.cms]
  command = "python3 admin/merge-config.py staging"

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    X-Frame-Options = "DENY"
